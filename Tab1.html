<div class="tab-pane fade show active" id="tab1">
  <div class="text-center"><h4>QUẢN LÝ THÔNG TIN HỌC SINH</h4></div>
  
  <div class="filter-box">
    <div class="row g-2 align-items-end">
      <div class="col-md-1"><label>Năm học</label><select id="t1_nam" class="form-select form-select-sm fw-bold text-primary"></select></div>
      <div class="col-md-1"><label>Lớp</label><select id="t1_lop" class="form-select form-select-sm fw-bold text-primary"></select></div>
      <div class="col-md-2"><label>CCCD</label><input id="t1_cccd" class="form-control form-control-sm" placeholder="Nhập..."></div>
      <div class="col-md-2"><label>Họ đệm</label><input id="t1_hodem" class="form-control form-control-sm"></div>
      <div class="col-md-2"><label>Tên</label><input id="t1_ten" class="form-control form-control-sm"></div>
      
      <div class="col-md-4 text-end">
        <button class="btn btn-sm btn-warning fw-bold px-3 me-1" id="btnEdit1" onclick="hks_kichHoatChinhSua_fn(1)" style="display:none"><i class="bi bi-pencil-square"></i> Sửa</button>
        <button class="btn btn-sm btn-primary px-3 me-1" onclick="hks_layDuLieuPhanMot_fn()"><i class="bi bi-search"></i> Tìm</button>
        <span id="groupEdit1" class="edit-mode-btn">
          <button class="btn btn-sm btn-success px-3 me-1" onclick="hks_dayDuLieuPhanMot_fn()"><i class="bi bi-hdd-fill"></i> Cập nhật</button>
          <button class="btn btn-sm btn-secondary px-3" onclick="hks_chenDongPhanMot_fn()"><i class="bi bi-plus-lg"></i> Thêm</button>
          <button class="btn btn-sm btn-info px-3 me-1" id="btnChuyenLop" onclick="hks_thucHienDoiLop_fn()" style="display:none"><i class="bi bi-arrow-left-right"></i> Chuyển lớp</button>
        </span>
      </div>
    </div>
  </div>

  <div class="table-container">
    <table class="table table-bordered table-striped table-hover table-sm mb-0" id="bang1">
      <thead>
        <tr>
          <th style="min-width:50px; width:50px;">#</th>
          <th style="min-width:100px">Năm học</th><th style="min-width:60px">Lớp</th><th style="min-width:110px">CCCD</th>
          <th style="min-width:110px">Họ đệm</th><th style="min-width:60px">Tên</th>
          <th style="min-width:100px">Ngày sinh</th><th style="min-width:60px">Nam/nữ</th><th style="min-width:95px">Nơi ở (Thôn)</th><th style="min-width:200px">Thường trú (Xã/tỉnh)</th>
          <th style="min-width:80px">Dân tộc</th><th style="min-width:80px">C.Sách</th><th style="min-width:80px">K.Tật</th><th style="min-width:60px">Nghèo</th><th style="min-width:60px">Cận N</th><th style="min-width:60px">BHYT</th>
          <th style="min-width:130px">Tên Bố</th><th style="min-width:130px">Tên Mẹ</th><th style="min-width:100px">SĐT</th><th style="min-width:50px">Khẩu nơi khác</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  function hks_layDuLieuPhanMot_fn() {
    hks_hienThiManHinhTai_fn(true);
    let hks_namChon_str = document.getElementById('t1_nam').value;
    let hks_lopChon_str = document.getElementById('t1_lop').value;
    let hks_khoaChon_str = `${hks_namChon_str}_${hks_lopChon_str}`;
    let hks_laQuanTriCapCao_bol = (hks_bienKhungHeThong_obj.hks_tapQuyenSuDung_arr && hks_bienKhungHeThong_obj.hks_tapQuyenSuDung_arr.includes('ALL'));
    let hks_coQuyenSua_bol = hks_laQuanTriCapCao_bol || (hks_bienKhungHeThong_obj.hks_tapQuyenSuDung_arr && hks_bienKhungHeThong_obj.hks_tapQuyenSuDung_arr.includes(hks_khoaChon_str));

    if(hks_coQuyenSua_bol) document.getElementById('btnEdit1').style.display = 'inline-block';
    else document.getElementById('btnEdit1').style.display = 'none';

    hks_khoiPhucTrangThaiGoc_fn(1);
    const hks_doiTuongLoc_obj = {
      hks_chuKyHoatDong_str: hks_namChon_str, hks_phomPhanLoai_str: hks_lopChon_str, hks_truongDinhTuyen_str: document.getElementById('t1_cccd').value,
      hks_truongPhuTro_str: document.getElementById('t1_hodem').value, hks_truongGiaTri_str: document.getElementById('t1_ten').value
    };
    
    hks_thucThiGiaoTiep_fn('hks_truyXuatThucThe_api', {hks_boLocTieuChuan_obj: hks_doiTuongLoc_obj, hks_dinhTuyenNguon_str: hks_hoSoNguoiDungHienTai_obj.reqId}).then(hks_ketQuaAPI_obj => {
        if(hks_ketQuaAPI_obj.success === false) { Swal.fire('Từ chối', 'Tài khoản chưa được cấp quyền truy xuất!', 'warning'); hks_hienThiManHinhTai_fn(false); return; }
        hks_veBangPhanMot_fn(hks_ketQuaAPI_obj);
    }).catch(e => { Swal.fire('Sự cố kết nối', e.message, 'warning'); hks_hienThiManHinhTai_fn(false); });
  }

  function hks_veBangPhanMot_fn(hks_duLieuBang_arr) {
    const hks_thanBang_el = document.querySelector('#bang1 tbody'); hks_thanBang_el.innerHTML = '';
    hks_duLieuBang_arr.forEach(hks_dongDuLieu_arr => hks_chenDongPhanMot_fn(hks_dongDuLieu_arr));
    hks_hienThiManHinhTai_fn(false);
  }

  function hks_chenDongPhanMot_fn(hks_duLieuBang_arr = null) {
    const hks_thanBang_el = document.querySelector('#bang1 tbody');
    const hks_theDong_el = document.createElement('tr');
    let hks_theCotXoa_el = document.createElement('td'); hks_theCotXoa_el.className = 'text-center align-middle'; 
    let hks_chuoiHtmlXoa_str = '';
    let hks_laQuanTriCapCao_bol = hks_bienKhungHeThong_obj.hks_quyenTuyetDoi_bol;
    
    if (!hks_duLieuBang_arr) {
       let hks_hienThiXoa_str = hks_trangThaiSuaMot_bol ? 'inline-block' : 'none';
       hks_chuoiHtmlXoa_str = `<i class="bi bi-x-circle-fill text-secondary fs-6" style="cursor:pointer; display:${hks_hienThiXoa_str}" title="Hủy" onclick="this.closest('tr').remove()"></i>`;
    } else {
       let hks_chuoiSTT_str = hks_thanBang_el.rows.length + 1;
       let hks_hienThiXoa_str = (hks_trangThaiSuaMot_bol && hks_laQuanTriCapCao_bol) ? 'inline-block' : 'none'; 
       let hks_hienThiSTT_str = (hks_trangThaiSuaMot_bol && hks_laQuanTriCapCao_bol) ? 'none' : 'inline-block';
       if (hks_laQuanTriCapCao_bol) {
           let hks_chuoiDuLieu_str = JSON.stringify({ hks_truong1: hks_duLieuBang_arr[0], hks_truong2: hks_duLieuBang_arr[1], hks_truong3: hks_duLieuBang_arr[2], hks_truong4: hks_duLieuBang_arr[3], hks_truong5: hks_duLieuBang_arr[4] }).replace(/"/g, "&quot;");
           hks_chuoiHtmlXoa_str = `
             <span class="text-muted stt-label" style="font-size:12px; display:${hks_hienThiSTT_str}">${hks_chuoiSTT_str}</span>
             <i class="bi bi-trash3-fill text-danger fs-6 btn-xoa-nguon" style="cursor:pointer; display:${hks_hienThiXoa_str}" onclick="hks_xuLyHanhDongXoa_fn(this, ${hks_chuoiDuLieu_str})"></i>
           `;
       } else {
           hks_chuoiHtmlXoa_str = `<span class="text-muted stt-label" style="font-size:12px;">${hks_chuoiSTT_str}</span>`; 
       }
    }
    hks_theCotXoa_el.innerHTML = hks_chuoiHtmlXoa_str; hks_theDong_el.appendChild(hks_theCotXoa_el);

    let hks_dienNamTruoc_str = !hks_duLieuBang_arr ? document.getElementById('t1_nam').value : "";
    let hks_dienLopTruoc_str = !hks_duLieuBang_arr ? document.getElementById('t1_lop').value : "";
    const hks_cauHinhCot_arr = [
      {k:'sel', o:hks_bienKhungHeThong_obj.hks_chuKyHoatDong_arr}, {k:'sel', o:hks_bienKhungHeThong_obj.hks_phomPhanLoai_arr}, 
      {k:'text'}, {k:'text'}, {k:'text'}, {k:'text'}, {k:'sel', o:['Nam','Nữ']},
      {k:'text'}, {k:'text'}, {k:'sel', o:hks_bienKhungHeThong_obj.hks_chiSoNhom_arr},
      {k:'text'}, {k:'text'}, {k:'num'}, {k:'num'}, {k:'num'},
      {k:'text'}, {k:'text'}, {k:'text'}, {k:'check'}
    ];

    let hks_voHieuHoa_bol = !hks_trangThaiSuaMot_bol;
    hks_cauHinhCot_arr.forEach((hks_thietLapCot_obj, hks_chiSoCot_num) => {
      let hks_theCot_el = document.createElement('td'); 
      let hks_giaTriCot_str = hks_duLieuBang_arr ? hks_duLieuBang_arr[hks_chiSoCot_num] : (hks_chiSoCot_num === 0 ? hks_dienNamTruoc_str : (hks_chiSoCot_num === 1 ? hks_dienLopTruoc_str : ""));
      if(hks_thietLapCot_obj.k === 'sel') {
        let hks_theChon_el = document.createElement('select'); hks_theChon_el.className = 'cell-input'; hks_theChon_el.disabled = hks_voHieuHoa_bol;
        hks_thietLapCot_obj.o.forEach(opt => { let hks_theTuyChon_el = document.createElement('option'); hks_theTuyChon_el.value = opt; hks_theTuyChon_el.text = opt; if(String(opt) === String(hks_giaTriCot_str)) hks_theTuyChon_el.selected = true; hks_theChon_el.add(hks_theTuyChon_el); });
        hks_theCot_el.appendChild(hks_theChon_el);
      } else if (hks_thietLapCot_obj.k === 'check') {
        let hks_theHopKiem_el = document.createElement('input'); hks_theHopKiem_el.type = 'checkbox'; hks_theHopKiem_el.disabled = hks_voHieuHoa_bol;
        if(String(hks_giaTriCot_str).toLowerCase() === 'x') hks_theHopKiem_el.checked = true;
        hks_theCot_el.className = 'text-center'; hks_theCot_el.appendChild(hks_theHopKiem_el);
      } else {
        let hks_theNhap_el = document.createElement('input'); hks_theNhap_el.className = 'cell-input'; hks_theNhap_el.disabled = hks_voHieuHoa_bol;
        hks_theNhap_el.type = hks_thietLapCot_obj.k === 'date' ? 'date' : (hks_thietLapCot_obj.k === 'num' ? 'number' : 'text');
        hks_theNhap_el.value = hks_giaTriCot_str;
        if(hks_chiSoCot_num === 5) hks_theNhap_el.placeholder = "dd/mm/yyyy"; hks_theCot_el.appendChild(hks_theNhap_el);
      }
      hks_theDong_el.appendChild(hks_theCot_el);
    });
    hks_thanBang_el.appendChild(hks_theDong_el);
  }

  function hks_xuLyHanhDongXoa_fn(hks_nutBamUI_el, hks_thongTinTruyen_obj) {
      Swal.fire({
        title: 'CẢNH BÁO BẢO MẬT!',
        html: `Bạn đang gửi lệnh ngắt mạch dữ liệu: <b style="color:#b71c1c;">${hks_thongTinTruyen_obj.hks_truong4} ${hks_thongTinTruyen_obj.hks_truong5}</b>?<br/>Hành động này sẽ thay đổi gốc dữ liệu.`,
        icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#3085d6', confirmButtonText: 'Đồng ý'
      }).then((result) => {
        if (result.isConfirmed) {
          hks_hienThiManHinhTai_fn(true);
          
          hks_thucThiGiaoTiep_fn('hks_thuHoiThucThe_api', {hks_thongTinXoa_obj: hks_thongTinTruyen_obj, hks_dinhTuyenNguon_str: hks_hoSoNguoiDungHienTai_obj.reqId}).then(hks_ketQuaAPI_obj => {
              hks_hienThiManHinhTai_fn(false);
              if(hks_ketQuaAPI_obj.success === false) { Swal.fire('Từ chối', 'Vượt quyền ưu tiên hệ thống!', 'warning'); return; }
              
              if(hks_ketQuaAPI_obj.message === 'SUCCESS') { Swal.fire('Hoàn tất!', 'Đã loại bỏ node.', 'success'); hks_nutBamUI_el.closest('tr').remove(); } 
              else { Swal.fire('Lỗi', hks_ketQuaAPI_obj.message, 'warning'); }
          }).catch(e => { Swal.fire('Sự cố kết nối', e.message, 'warning'); hks_hienThiManHinhTai_fn(false); });
        }
      });
  }

  function hks_dayDuLieuPhanMot_fn() {
    const hks_thanBang_el = document.querySelector('#bang1 tbody'); let hks_duLieuCanLuu_arr = [];
    for (let hks_theDong_el of hks_thanBang_el.rows) {
      let hks_dongDuLieu_arr = [];
      for (let i = 1; i < hks_theDong_el.cells.length; i++) {
        let hks_phanTuUI_el = hks_theDong_el.cells[i].firstElementChild;
        if(hks_phanTuUI_el.type === 'checkbox') hks_dongDuLieu_arr.push(hks_phanTuUI_el.checked ? 'x' : ''); else hks_dongDuLieu_arr.push(hks_phanTuUI_el.value);
      }
      if(hks_dongDuLieu_arr[0] && hks_dongDuLieu_arr[1] && hks_dongDuLieu_arr[3] && hks_dongDuLieu_arr[4]) hks_duLieuCanLuu_arr.push(hks_dongDuLieu_arr);
    }
    if(hks_duLieuCanLuu_arr.length === 0) { Swal.fire("Cảnh báo!", "Dữ liệu thiếu logic mảng!", "warning"); return; }
    hks_hienThiManHinhTai_fn(true);
    
    hks_thucThiGiaoTiep_fn('hks_ghiNhanPhanHeMot_api', {hks_mangDuLieuDauVao_arr: hks_duLieuCanLuu_arr, hks_dinhTuyenNguon_str: hks_hoSoNguoiDungHienTai_obj.reqId}).then(hks_ketQuaAPI_obj => { 
      if(hks_ketQuaAPI_obj.success === false) { Swal.fire('Từ chối', 'Lỗi phân luồng!', 'warning'); hks_hienThiManHinhTai_fn(false); return; }
      Swal.fire("Hoàn tất!", hks_ketQuaAPI_obj.message, "success"); hks_khoiPhucTrangThaiGoc_fn(1); hks_layDuLieuPhanMot_fn(); 
    }).catch(e => { Swal.fire('Sự cố kết nối', e.message, 'warning'); hks_hienThiManHinhTai_fn(false); });
  }
  
  function hks_thucHienDoiLop_fn() {
      Swal.fire({
        title: 'Cập nhật cấu trúc', text: "Đồng bộ chuyển đổi thư mục?", icon: 'warning', showCancelButton: true, confirmButtonText: 'Đồng ý'
      }).then((result) => {
        if (result.isConfirmed) {
          const hks_thanBang_el = document.querySelector('#bang1 tbody'); let hks_duLieuCanLuu_arr = [];
          for (let hks_theDong_el of hks_thanBang_el.rows) {
            let hks_dongDuLieu_arr = [];
            for (let i = 1; i < hks_theDong_el.cells.length; i++) {
              let hks_phanTuUI_el = hks_theDong_el.cells[i].firstElementChild;
              if(hks_phanTuUI_el.type === 'checkbox') hks_dongDuLieu_arr.push(hks_phanTuUI_el.checked ? 'x' : ''); else hks_dongDuLieu_arr.push(hks_phanTuUI_el.value);
            }
            if(hks_dongDuLieu_arr[0] && hks_dongDuLieu_arr[1]) hks_duLieuCanLuu_arr.push(hks_dongDuLieu_arr);
          }
          if(hks_duLieuCanLuu_arr.length === 0) return;
          hks_hienThiManHinhTai_fn(true);
          
          hks_thucThiGiaoTiep_fn('hks_dieuChuyenThucThe_api', {hks_mangDuLieuDauVao_arr: hks_duLieuCanLuu_arr, hks_dinhTuyenNguon_str: hks_hoSoNguoiDungHienTai_obj.reqId}).then(hks_ketQuaAPI_obj => { 
              if(hks_ketQuaAPI_obj.success === false) { Swal.fire('Từ chối', 'Mất kết nối máy chủ xác thực!', 'warning'); hks_hienThiManHinhTai_fn(false); return; }
              let hks_kieuBieuTuong_str = hks_ketQuaAPI_obj.message.includes("thành công") ? "success" : "info";
              Swal.fire("Kết quả", hks_ketQuaAPI_obj.message, hks_kieuBieuTuong_str); hks_khoiPhucTrangThaiGoc_fn(1); hks_layDuLieuPhanMot_fn();
          }).catch(e => { Swal.fire('Sự cố kết nối', e.message, 'warning'); hks_hienThiManHinhTai_fn(false); });
        }
      });
  }
</script>
